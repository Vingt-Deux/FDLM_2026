<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ardoise WILD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  :root {
    --bg: #1c1c24;
    --surface: #26262f;
    --surface2: #32323e;
    --accent: #c8ff00;
    --text: #f2f2f5;
    --muted: #80809a;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 30px;
  }

  header { display: none; }

  .total-bar {
    margin: 16px 20px 0;
    background: var(--accent);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 10px;
    z-index: 10;
  }

  .total-label {
    font-size: 13px;
    font-weight: 700;
    color: #0f0f0f;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .total-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .total-amount {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: #0f0f0f;
    line-height: 1;
  }

  .reset-btn {
    background: rgba(0,0,0,0.15);
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(0,0,0,0.6);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .reset-btn:hover { background: rgba(0,0,0,0.25); color: #000; }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    padding: 20px 20px 8px;
  }

  .items-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .item-card.active { border-color: var(--accent); }

  .item-info { flex: 1; min-width: 0; }

  .item-name {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-price-unit {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .item-controls {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border-radius: 10px;
    overflow: hidden;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 20px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, color 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .ctrl-btn.plus:active { background: var(--accent); color: #000; }
  .ctrl-btn.minus { color: var(--muted); }
  .ctrl-btn.minus:active { background: #3a3a4a; color: var(--text); }

  .item-count {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    min-width: 32px;
    text-align: center;
  }

  .item-subtotal {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    min-width: 56px;
    text-align: right;
  }
  .item-subtotal.zero { color: var(--muted); }
  .item-subtotal.negative { color: #ff6b6b; }
</style>
</head>
<body>

<header>
  <h1>Ardoise<span>.</span></h1>
</header>

<div class="total-bar">
  <span class="total-label">Total</span>
  <div class="total-right">
    <span class="total-amount" id="total">0,00 €</span>
    <button class="reset-btn" onclick="resetAll()">Raz</button>
  </div>
</div>

<div id="app"></div>

<script>
  const MENU = [
    { section: '🍺 Bières Mira' },
    { id: 2,  name: '🟡 Blonde 50cl',             price: 6.0 },
    { id: 1,  name: '🟡 Blonde 25cl',             price: 3.0 },
    { id: 4,  name: '⬜ Blanche 50cl',            price: 7.0 },
    { id: 3,  name: '⬜ Blanche 25cl',            price: 3.5 },
    { id: 6,  name: '🟤 IPA 50cl',                price: 8.0 },
    { id: 5,  name: '🟤 IPA 25cl',                price: 4.0 },
    { section: '🍷 Vins 12.5cl' },
    { id: 7,  name: '🤍 Blanc',                   price: 4.0 },
    { id: 8,  name: '❤️ Rouge',                   price: 4.0 },
    { section: '🍹 Cocktails / Shots' },
    { id: 9,  name: '🌿 Get-Perrier 25cl',        price: 7.0 },
    { id: 10, name: '🥃 Shot (Get27 / Bailey\'s…)', price: 3.0 },
    { section: '🧃 Softs 25cl' },
    { id: 11, name: '🧉 Club Mate',                price: 3.5 },
    { id: 14, name: '🥤 Cola (Club Mate)',         price: 3.5 },
    { id: 15, name: '🫚 Ginger Beer',              price: 3.5 },
    { id: 12, name: '🍋 Limonade / Diabolo',      price: 2.0 },
    { section: '♻️ Consigne' },
    { id: 13, name: '♻️ Écocup',                  price: 1.0 },
  ];

  let counts = {};
  MENU.filter(i => i.id).forEach(i => counts[i.id] = 0);

  function fmt(n) {
    return (n >= 0 ? '' : '−') + Math.abs(n).toFixed(2).replace('.', ',') + ' €';
  }

  function render() {
    const app = document.getElementById('app');
    app.innerHTML = '';

    MENU.forEach(entry => {
      if (entry.section) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = entry.section;
        app.appendChild(label);

        const list = document.createElement('div');
        list.className = 'items-list';
        app.appendChild(list);
        return;
      }

      const count = counts[entry.id];
      const subtotal = entry.price * count;
      const lastList = app.querySelector('.items-list:last-child');
      const card = document.createElement('div');
      card.className = 'item-card' + (count > 0 ? ' active' : '');
      const subtotalClass = count === 0 ? 'zero' : (entry.price < 0 ? 'negative' : '');

      card.innerHTML = `
        <div class="item-info">
          <div class="item-name">${entry.name}</div>
          <div class="item-price-unit">${fmt(entry.price)} / unité</div>
        </div>
        <div class="item-controls">
          <button class="ctrl-btn minus" onclick="change(${entry.id}, -1)">−</button>
          <span class="item-count">${count}</span>
          <button class="ctrl-btn plus" onclick="change(${entry.id}, 1)">+</button>
        </div>
        <div class="item-subtotal ${subtotalClass}">${fmt(subtotal)}</div>
      `;
      lastList.appendChild(card);
    });

    updateTotal();
  }

  function updateTotal() {
    const total = MENU.filter(i => i.id).reduce((sum, i) => sum + i.price * counts[i.id], 0);
    document.getElementById('total').textContent = fmt(total);
  }

  function change(id, delta) {
    counts[id] = Math.max(0, counts[id] + delta);
    render();
  }

  function resetAll() {
    MENU.filter(i => i.id).forEach(i => counts[i.id] = 0);
    render();
  }

  render();
</script>
</body>
</html>
